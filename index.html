<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    
    <title>Frontend Mentor | Interactive rating component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>

    <!-- Rating state start -->
    <div class="rating container">
        <div class="rating__content">

            <div class="rating__star">
                <img class="rating__star-img" src="images/icon-star.svg" alt="Star">
            </div>

            <h1 class="rating__title">How did we do?</h1>

            <p class="rating__text">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>

            <div class="rating__selectors">
                <span class="rating__selector" data-number="1">1</span>
                <span class="rating__selector" data-number="2">2</span>
                <span class="rating__selector" data-number="3">3</span>
                <span class="rating__selector" data-number="4">4</span>
                <span class="rating__selector" data-number="5">5</span>
            </div>

            <button class="btn" id="submitBtn">Submit</button>
        </div>
    </div>
    <!-- Rating state end -->

    <!-- Thank you state start -->
    <div class="thank-you container">

        <div class="thank__you__content">
            <div class="thank-you__img-container">
                <img class="thank-you__img" src="images/illustration-thank-you.svg" alt="Illustration Thank You">
            </div>
    
            <div class="thank-you__selected-container">
                <p class="thank-you__selected">
                    You selected <span class="thank-you__selected-span">0</span> out of 5</div>
                </p> 

            <h2 class="thank-you__title">Thank you!</h2>
    
            <p class="thank-you__text">We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>
        </div>

    </div> 
    <!-- Thank you state end -->

    <script src="js/scripts.js"></script>

</body>
</html>
